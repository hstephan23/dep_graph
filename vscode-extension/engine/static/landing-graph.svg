<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" opacity="0.6"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="900" height="520" fill="url(#dots)"/>
  </g>

  <!-- Edges (drawn first, behind nodes) -->
  <g stroke-width="2" fill="none" opacity="0.5">
    <!-- main.ts → app.ts -->
    <path d="M 148 110 C 200 130, 260 155, 310 175" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- app.ts → router.ts -->
    <path d="M 360 195 C 400 210, 430 235, 450 260" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- app.ts → config -->
    <path d="M 310 200 C 260 250, 220 310, 190 350" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- router → Dashboard -->
    <path d="M 490 280 C 530 290, 570 295, 590 300" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- router → UserList -->
    <path d="M 465 300 C 470 340, 480 370, 500 400" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- router → guard -->
    <path d="M 440 280 C 390 310, 350 340, 330 360" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- Dashboard → api/client -->
    <path d="M 660 290 C 700 260, 730 230, 750 200" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- Dashboard → Layout (cycle) -->
    <path d="M 640 320 C 640 360, 620 390, 580 410" stroke="#ef4444" stroke-width="2.5" opacity="0.8" marker-end="url(#arrowRed)"/>
    <!-- Layout → Dashboard (cycle) -->
    <path d="M 560 390 C 580 360, 610 330, 630 310" stroke="#ef4444" stroke-width="2.5" opacity="0.8" marker-end="url(#arrowRed)"/>
    <!-- api/client → logger -->
    <path d="M 770 215 C 790 260, 800 310, 800 350" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- api/client → config -->
    <path d="M 735 215 C 600 290, 350 340, 200 365" stroke="#475569" marker-end="url(#arrow)" opacity="0.3"/>
    <!-- UserList → api/users -->
    <path d="M 530 420 C 580 440, 640 450, 690 450" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- guard → session -->
    <path d="M 310 390 C 280 420, 260 440, 250 460" stroke="#475569" marker-end="url(#arrow)"/>
    <!-- format → validate -->
    <path d="M 130 440 C 120 410, 115 380, 115 360" stroke="#475569" marker-end="url(#arrow)"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- main.ts (entry - green) -->
    <circle cx="135" cy="100" r="22" fill="#22c55e" opacity="0.9"/>
    <text x="135" y="105" text-anchor="middle" fill="white" font-size="9" font-family="Inter, sans-serif" font-weight="600">main.ts</text>

    <!-- app.ts (critical - red, large) -->
    <circle cx="335" cy="185" r="34" fill="#ef4444" opacity="0.9"/>
    <text x="335" y="190" text-anchor="middle" fill="white" font-size="10" font-family="Inter, sans-serif" font-weight="600">app.ts</text>

    <!-- router.ts (high - orange) -->
    <circle cx="460" cy="275" r="28" fill="#f97316" opacity="0.9"/>
    <text x="460" y="280" text-anchor="middle" fill="white" font-size="9" font-family="Inter, sans-serif" font-weight="600">router.ts</text>

    <!-- Dashboard.tsx (high - orange) -->
    <circle cx="640" cy="300" r="26" fill="#10b981" opacity="0.9"/>
    <text x="640" y="296" text-anchor="middle" fill="white" font-size="8" font-family="Inter, sans-serif" font-weight="600">Dashboard</text>
    <text x="640" y="308" text-anchor="middle" fill="white" font-size="7" font-family="Inter, sans-serif" opacity="0.7">.tsx</text>

    <!-- Layout.tsx (warning - yellow) -->
    <circle cx="560" cy="405" r="23" fill="#10b981" opacity="0.9"/>
    <text x="560" y="401" text-anchor="middle" fill="white" font-size="8" font-family="Inter, sans-serif" font-weight="600">Layout</text>
    <text x="560" y="413" text-anchor="middle" fill="white" font-size="7" font-family="Inter, sans-serif" opacity="0.7">.tsx</text>

    <!-- UserList.tsx -->
    <circle cx="510" cy="420" r="20" fill="#10b981" opacity="0.9"/>
    <text x="510" y="416" text-anchor="middle" fill="white" font-size="7.5" font-family="Inter, sans-serif" font-weight="600">UserList</text>
    <text x="510" y="427" text-anchor="middle" fill="white" font-size="6.5" font-family="Inter, sans-serif" opacity="0.7">.tsx</text>

    <!-- api/client.ts (high - blue) -->
    <circle cx="755" cy="195" r="29" fill="#3b82f6" opacity="0.9"/>
    <text x="755" y="191" text-anchor="middle" fill="white" font-size="8" font-family="Inter, sans-serif" font-weight="600">api/client</text>
    <text x="755" y="203" text-anchor="middle" fill="white" font-size="7" font-family="Inter, sans-serif" opacity="0.7">.ts</text>

    <!-- api/users.ts -->
    <circle cx="715" cy="450" r="20" fill="#3b82f6" opacity="0.9"/>
    <text x="715" y="446" text-anchor="middle" fill="white" font-size="7.5" font-family="Inter, sans-serif" font-weight="600">api/users</text>
    <text x="715" y="457" text-anchor="middle" fill="white" font-size="6.5" font-family="Inter, sans-serif" opacity="0.7">.ts</text>

    <!-- auth/guard.ts (warning - pink) -->
    <circle cx="320" cy="375" r="23" fill="#ec4899" opacity="0.9"/>
    <text x="320" y="371" text-anchor="middle" fill="white" font-size="7.5" font-family="Inter, sans-serif" font-weight="600">auth/guard</text>
    <text x="320" y="383" text-anchor="middle" fill="white" font-size="6.5" font-family="Inter, sans-serif" opacity="0.7">.ts</text>

    <!-- auth/session.ts -->
    <circle cx="245" cy="465" r="20" fill="#ec4899" opacity="0.9"/>
    <text x="245" y="461" text-anchor="middle" fill="white" font-size="7" font-family="Inter, sans-serif" font-weight="600">session</text>
    <text x="245" y="472" text-anchor="middle" fill="white" font-size="6.5" font-family="Inter, sans-serif" opacity="0.7">.ts</text>

    <!-- config/index.ts (warning - red) -->
    <circle cx="185" cy="370" r="23" fill="#ef4444" opacity="0.9"/>
    <text x="185" y="366" text-anchor="middle" fill="white" font-size="7.5" font-family="Inter, sans-serif" font-weight="600">config</text>
    <text x="185" y="378" text-anchor="middle" fill="white" font-size="6.5" font-family="Inter, sans-serif" opacity="0.7">/index.ts</text>

    <!-- utils/logger.ts -->
    <circle cx="810" cy="365" r="26" fill="#f59e0b" opacity="0.9"/>
    <text x="810" y="361" text-anchor="middle" fill="white" font-size="8" font-family="Inter, sans-serif" font-weight="600">logger</text>
    <text x="810" y="373" text-anchor="middle" fill="white" font-size="7" font-family="Inter, sans-serif" opacity="0.7">.ts</text>

    <!-- utils/format.ts -->
    <circle cx="120" cy="445" r="24" fill="#f59e0b" opacity="0.9"/>
    <text x="120" y="441" text-anchor="middle" fill="white" font-size="8" font-family="Inter, sans-serif" font-weight="600">format</text>
    <text x="120" y="453" text-anchor="middle" fill="white" font-size="7" font-family="Inter, sans-serif" opacity="0.7">.ts</text>

    <!-- utils/validate.ts -->
    <circle cx="110" cy="350" r="20" fill="#f59e0b" opacity="0.9"/>
    <text x="110" y="346" text-anchor="middle" fill="white" font-size="7.5" font-family="Inter, sans-serif" font-weight="600">validate</text>
    <text x="110" y="357" text-anchor="middle" fill="white" font-size="6.5" font-family="Inter, sans-serif" opacity="0.7">.ts</text>
  </g>

  <!-- Cycle indicator -->
  <g filter="url(#softGlow)">
    <rect x="580" y="340" width="110" height="24" rx="12" fill="#ef4444" opacity="0.15"/>
    <text x="635" y="356" text-anchor="middle" fill="#ef4444" font-size="9" font-family="Inter, sans-serif" font-weight="600" opacity="0.9">Cycle Detected</text>
  </g>

  <!-- Logo + Brand -->
  <g transform="translate(24, 14)" opacity="0.9">
    <image href="logo.png" x="0" y="0" width="36" height="36"/>
    <text x="42" y="16" fill="white" font-size="18" font-family="Inter, sans-serif" font-weight="700" letter-spacing="-0.5">DepGraph</text>
    <text x="42" y="32" fill="#94a3b8" font-size="10" font-family="Inter, sans-serif">Interactive Dependency Visualization</text>
  </g>

  <!-- Color legend -->
  <g transform="translate(730, 50)" opacity="0.65">
    <circle cx="0" cy="0" r="5" fill="#22c55e"/>
    <text x="12" y="4" fill="#cbd5e1" font-size="9" font-family="Inter, sans-serif">Entry point</text>
    <circle cx="0" cy="18" r="5" fill="#ef4444"/>
    <text x="12" y="22" fill="#cbd5e1" font-size="9" font-family="Inter, sans-serif">Critical</text>
    <circle cx="0" cy="36" r="5" fill="#f97316"/>
    <text x="12" y="40" fill="#cbd5e1" font-size="9" font-family="Inter, sans-serif">High influence</text>
    <circle cx="0" cy="54" r="5" fill="#3b82f6"/>
    <text x="12" y="58" fill="#cbd5e1" font-size="9" font-family="Inter, sans-serif">Normal</text>
    <circle cx="0" cy="72" r="5" fill="#f59e0b"/>
    <text x="12" y="76" fill="#cbd5e1" font-size="9" font-family="Inter, sans-serif">Utilities</text>
  </g>

  <!-- Stats bar -->
  <g transform="translate(30, 485)" opacity="0.5">
    <text x="0" y="0" fill="#94a3b8" font-size="9" font-family="Inter, monospace">14 nodes  ·  17 edges  ·  1 cycle  ·  4 directories</text>
  </g>
</svg>
