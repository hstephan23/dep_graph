<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive Dependency Graph Viewer. Visualize file dependencies, reference counts, and detect circular dependencies for C, C++, JavaScript, and TypeScript projects.">
    <title>Dependency Graph Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --warning-bg: #fef2f2;
            --warning-border: #fca5a5;
            --loading-bg: rgba(255, 255, 255, 0.8);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --danger: #ef4444;
            --warning-bg: #450a0a;
            --warning-border: #991b1b;
            --loading-bg: rgba(15, 23, 42, 0.8);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.5);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        #controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-right: 1px solid var(--border-color);
            padding-right: 1rem;
        }

        .control-group:last-child {
            border-right: none;
            padding-right: 0;
        }

        details.dropdown {
            position: relative;
        }

        details.dropdown summary {
            list-style: none;
            padding: 0.5rem 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: border-color 0.2s;
        }

        details.dropdown summary:hover {
            border-color: var(--primary);
        }

        details.dropdown summary::-webkit-details-marker {
            display: none;
        }

        details.dropdown .dropdown-content {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 100;
            min-width: 220px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        input[type="text"] {
            border: none;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            outline: none;
            background: transparent;
            width: 250px;
            font-family: inherit;
            color: var(--text-main);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #cycleWarning {
            display: none;
            align-items: center;
            gap: 0.5rem;
            color: var(--danger);
            font-size: 0.875rem;
            font-weight: 500;
            background-color: var(--warning-bg);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--warning-border);
        }

        #main-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        #cy {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: block;
        }

        #sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 5;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .ref-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        .ref-item:hover {
            background-color: var(--bg-color);
        }

        .ref-name {
            word-break: break-all;
            margin-right: 0.5rem;
            position: relative;
        }

        .sidebar-legend {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .legend-dot--god {
            background-color: #f97316;
        }

        .legend-dot--orphan {
            background-color: #ef4444;
        }

        .custom-tooltip {
            position: fixed;
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 9999;
            pointer-events: none;
            font-weight: normal;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .custom-tooltip.visible {
            opacity: 1;
        }


        .ref-count {
            background-color: var(--primary);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 1.5rem;
            text-align: center;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--loading-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(2px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            background: var(--text-main);
            color: var(--bg-color);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
        }

        .mode-selector {
            display: flex;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .mode-selector input[type="radio"] {
            display: none;
        }

        .mode-selector label {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            border-right: 1px solid var(--border-color);
            user-select: none;
            transition: background-color 0.2s, color 0.2s;
        }

        .mode-selector label:last-of-type {
            border-right: none;
        }

        .mode-selector label:hover {
            background-color: var(--border-color);
        }

        .mode-selector input[type="radio"]:checked + label {
            background-color: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <noscript>
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #333;">
            <h2>JavaScript Required</h2>
            <p>This application requires JavaScript to render the dependency graph. Please enable JavaScript in your browser settings.</p>
        </div>
    </noscript>
    <header>
        <h1>Dependency Viewer</h1>
        <div id="controls">
            <button id="themeToggle" onclick="toggleTheme()" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <div class="control-group">
                <div class="input-group">
                    <input type="text" id="dirInput" placeholder="Enter directory path..." value="test_files" onkeydown="if(event.key === 'Enter') loadGraph()">
                </div>
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Search file..." onkeydown="if(event.key === 'Enter') searchNode()">
                </div>
                <button onclick="loadGraph()">Generate Graph</button>
            </div>
            
            <div class="control-group">
                <details class="dropdown">
                    <summary>
                        Filters & Settings
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </summary>
                    <div class="dropdown-content">
                        <div class="input-group" style="width: 100%;">
                            <input type="text" id="filterDirInput" placeholder="Filter by subdirectory..." value="" onkeydown="if(event.key === 'Enter') updateGraph()" style="width: 100%;">
                        </div>
                        <label class="checkbox-label">
                            <input type="checkbox" id="hideSystemHeaders" checked onchange="updateGraph()">
                            Hide System Headers
                        </label>
                        <div style="font-size: 0.75rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">Language Mode</div>
                        <div class="mode-selector">
                            <input type="radio" name="langMode" id="modeC" value="c" checked onchange="updateGraph()">
                            <label for="modeC">C</label>
                            <input type="radio" name="langMode" id="modeCpp" value="cpp" onchange="updateGraph()">
                            <label for="modeCpp">C++</label>
                            <input type="radio" name="langMode" id="modeJs" value="js" onchange="updateGraph()">
                            <label for="modeJs">TS/JS</label>
                        </div>
                        <label class="checkbox-label">
                            <input type="checkbox" id="hideIsolated" checked onchange="updateGraph()">
                            Hide Isolated Files
                        </label>
                    </div>
                </details>
            </div>

            <div class="control-group">
                <label for="zipUpload" role="button" tabindex="0" style="background-color: var(--warning-border); color: var(--text-main); border: none; border-radius: 6px; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: inherit; display: inline-block;">Upload File/ZIP</label>
                <input type="file" id="zipUpload" accept=".zip,.c,.h,.cpp,.hpp,.cc,.cxx,.hxx,.js,.jsx,.mjs,.cjs,.ts,.tsx" style="display: none;" onchange="handleZipSelect(event)">
                <details class="dropdown">
                    <summary style="background-color: var(--primary); color: white; border: none;">
                        Export
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </summary>
                    <div class="dropdown-content" style="min-width: 120px; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem;">
                        <button onclick="exportJSON()" style="width: 100%; background-color: var(--primary); color: white;">Export JSON</button>
                        <button onclick="exportPNG()" style="width: 100%; background-color: var(--primary); color: white;">Export PNG</button>
                        <button onclick="exportDOT()" style="width: 100%; background-color: var(--primary); color: white;">Export DOT</button>
                    </div>
                </details>
            </div>
            
            <div id="cycleWarning">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
                Circular Dependency
            </div>
        </div>
    </header>
    
    <div id="main-container">
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
        </div>
        <div id="cy"></div>
        <div id="emptyState" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:var(--text-muted); font-size:0.95rem; max-width:360px; z-index:15; pointer-events:none;">
            <div style="font-size:2rem; margin-bottom:0.75rem;">No files found</div>
            <div>Make sure the directory path is correct and that at least one file type toggle is enabled in Filters &amp; Settings.</div>
        </div>
        <div id="sidebar">
            <div class="sidebar-header" id="cycles-header" style="display: none;">Circular Dependencies</div>
            <div id="cycles-list"></div>
            <div class="sidebar-header">Reference Counts</div>
            <div class="sidebar-legend">
                <span class="legend-item"><span class="legend-dot legend-dot--god"></span> God (high refs)</span>
                <span class="legend-item"><span class="legend-dot legend-dot--orphan"></span> Orphan (0 refs)</span>
            </div>
            <div id="ref-list"></div>
        </div>
    </div>

    <script>
        function showToast(message, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('visible'));
            setTimeout(() => {
                toast.classList.remove('visible');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        const tooltip = document.createElement('div');
        tooltip.className = 'custom-tooltip';
        document.body.appendChild(tooltip);

        function attachTooltip(el, text) {
            el.addEventListener('mouseenter', (e) => {
                tooltip.textContent = text;
                const rect = el.getBoundingClientRect();
                tooltip.style.left = rect.left + rect.width / 2 + 'px';
                tooltip.style.top = rect.top - 8 + 'px';
                tooltip.style.transform = 'translate(-50%, -100%)';
                tooltip.classList.add('visible');
            });
            el.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        }

        // SVG paths for the theme toggle icon
        const ICON_MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        const ICON_SUN = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function applyThemeIcon(theme) {
            document.getElementById('themeIcon').innerHTML = theme === 'dark' ? ICON_SUN : ICON_MOON;
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            applyThemeIcon(newTheme);
        }

        window.addEventListener('DOMContentLoaded', () => {
            applyThemeIcon(document.documentElement.getAttribute('data-theme'));
        });

        let cy;
        let currentGraphData = null;

        function exportJSON() {
            if (!currentGraphData) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentGraphData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "dependency_graph.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function exportPNG() {
            if (!cy) return;
            const b64 = cy.png({
                output: 'base64uri',
                bg: getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim(),
                full: true
            });
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", b64);
            downloadAnchorNode.setAttribute("download", "dependency_graph.png");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function exportDOT() {
            if (!currentGraphData) return;
            let dotStr = 'digraph DependencyGraph {\n';
            dotStr += '  node [shape=box, style=filled, fontname="Inter"];\n';
            dotStr += '  rankdir=LR;\n';
            
            // Add nodes
            if (currentGraphData.nodes) {
                currentGraphData.nodes.forEach(node => {
                    const id = node.data.id;
                    const color = node.data.color || "#cccccc";
                    dotStr += `  "${id}" [fillcolor="${color}"];\n`;
                });
            }
            
            // Add edges
            if (currentGraphData.edges) {
                currentGraphData.edges.forEach(edge => {
                    const source = edge.data.source;
                    const target = edge.data.target;
                    const color = edge.data.color || "#94a3b8";
                    const isCycle = edge.classes && edge.classes.includes("cycle");
                    const cycleAttr = isCycle ? ', color="red", penwidth=2' : `color="${color}"`;
                    dotStr += `  "${source}" -> "${target}" [${cycleAttr}];\n`;
                });
            }
            
            dotStr += '}\n';

            const dataStr = "data:text/vnd.graphviz;charset=utf-8," + encodeURIComponent(dotStr);
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "dependency_graph.dot");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function searchNode() {
            if (!cy) return;
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) {
                cy.nodes().style({
                    'border-width': 0,
                    'border-color': 'transparent'
                });
                return;
            }
            
            const nodes = cy.nodes().filter(n => n.id().toLowerCase().includes(query));
            cy.nodes().style({
                'border-width': 0,
                'border-color': 'transparent'
            });
            
            if (nodes.length > 0) {
                nodes.style({
                    'border-width': 4,
                    'border-color': '#ffeb3b',
                    'border-style': 'solid'
                });
                cy.animate({
                    center: { eles: nodes[0] },
                    zoom: 1.5
                }, { duration: 500 });
            } else {
                showToast('No matching files found');
            }
        }

        function renderGraph(data) {
            currentGraphData = data;
            const warning = document.getElementById('cycleWarning');
            const cyclesHeader = document.getElementById('cycles-header');
            const cyclesList = document.getElementById('cycles-list');
            const emptyState = document.getElementById('emptyState');

            emptyState.style.display = (!data.nodes || data.nodes.length === 0) ? 'block' : 'none';
            
            if (data.has_cycles) {
                warning.style.display = 'flex';
                if (data.cycles && data.cycles.length > 0) {
                    cyclesHeader.style.display = 'block';
                    cyclesList.innerHTML = '';
                    
                    data.cycles.forEach((cycle, index) => {
                        const div = document.createElement('div');
                        div.className = 'ref-item';
                        div.style.flexDirection = 'column';
                        div.style.alignItems = 'flex-start';
                        div.style.gap = '8px';
                        div.style.backgroundColor = 'var(--warning-bg)';
                        
                        const title = document.createElement('div');
                        title.style.fontWeight = '600';
                        title.style.color = 'var(--danger)';
                        title.innerText = `Cycle ${index + 1} (${cycle.length} files)`;
                        div.appendChild(title);
                        
                        cycle.forEach(nodeId => {
                            const nodeDiv = document.createElement('div');
                            nodeDiv.style.display = 'flex';
                            nodeDiv.style.alignItems = 'center';
                            nodeDiv.style.gap = '8px';
                            nodeDiv.style.marginLeft = '8px';
                            
                            const nameSpan = document.createElement('span');
                            nameSpan.className = 'ref-name';
                            nameSpan.style.cursor = 'pointer';
                            attachTooltip(nameSpan, 'Center node');
                            nameSpan.textContent = nodeId;
                            nodeDiv.appendChild(nameSpan);
                            nameSpan.onclick = () => {
                                const node = cy.getElementById(nodeId);
                                if (node.length > 0) {
                                    cy.animate({
                                        center: { eles: node },
                                        zoom: 1.5
                                    }, { duration: 500 });
                                }
                            };
                            div.appendChild(nodeDiv);
                        });
                        
                        cyclesList.appendChild(div);
                    });
                }
            } else {
                warning.style.display = 'none';
                cyclesHeader.style.display = 'none';
                cyclesList.innerHTML = '';
            }
            if (cy) { cy.destroy(); }
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: [
                    ...data.nodes,
                    ...data.edges
                ],
                style: [
                    {
                        selector: 'node',
                        style: {
                            'width': 'data(size)',
                            'height': 'data(size)',
                            'background-color': 'data(color)',
                            'label': 'data(id)',
                            'color': '#fff',
                            'text-outline-color': 'data(color)',
                            'text-outline-width': 2,
                            'font-size': function(ele) { return Math.max(14, Math.min(36, ele.data('size') / 8)) + 'px'; },
                            'text-valign': 'center',
                            'text-halign': 'center'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 5,
                            'line-color': 'data(color)',
                            'target-arrow-color': 'data(color)',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier'
                        }
                    },
                    {
                        selector: 'edge.cycle',
                        style: {
                            'line-color': '#FF4136',
                            'target-arrow-color': '#FF4136',
                            'width': 3
                        }
                    }
                ],
                layout: {
                    name: 'cose',
                    padding: 200,
                    nodeRepulsion: function( node ){ return 80000000; },
                    idealEdgeLength: function( edge ){ return 800; },
                    edgeElasticity: function( edge ){ return 100; },
                    gravity: 50,
                    numIter: 2000
                }
            });

            const refList = document.getElementById('ref-list');
            refList.innerHTML = '';
            
            const inDegrees = {};
            data.nodes.forEach(n => {
                inDegrees[n.data.id] = 0;
            });
            data.edges.forEach(e => {
                if (inDegrees[e.data.target] !== undefined) {
                    inDegrees[e.data.target]++;
                }
            });
            
            const sortedNodes = data.nodes.map(n => ({
                id: n.data.id,
                count: inDegrees[n.data.id]
            })).sort((a, b) => b.count - a.count);
            
            const maxCount = sortedNodes.length > 0 ? sortedNodes[0].count : 0;
            const godThreshold = Math.max(10, maxCount * 0.5);
            
            sortedNodes.forEach(item => {
                const isGod = item.count >= godThreshold && item.count > 0;
                const isOrphan = item.count === 0;

                const div = document.createElement('div');
                div.className = 'ref-item';
                const leftDiv = document.createElement('div');
                leftDiv.style.cssText = 'display: flex; align-items: center; gap: 8px; overflow: hidden;';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = true;
                checkbox.className = 'node-toggle';
                checkbox.title = 'Toggle visibility';
                checkbox.style.flexShrink = '0';
                leftDiv.appendChild(checkbox);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'ref-name';
                nameSpan.style.cursor = 'pointer';
                if (isGod) {
                    nameSpan.style.fontWeight = 'bold';
                    nameSpan.style.color = '#f97316';
                } else if (isOrphan) {
                    nameSpan.style.fontWeight = 'bold';
                    nameSpan.style.color = '#ef4444';
                }
                nameSpan.textContent = item.id;
                leftDiv.appendChild(nameSpan);

                const countSpan = document.createElement('span');
                countSpan.className = 'ref-count';
                countSpan.textContent = item.count;

                div.appendChild(leftDiv);
                div.appendChild(countSpan);

                checkbox.onchange = (e) => {
                    const node = cy.getElementById(item.id);
                    if (node.length > 0) {
                        if (e.target.checked) {
                            node.style('display', 'element');
                        } else {
                            node.style('display', 'none');
                        }
                    }
                };

                nameSpan.onclick = () => {
                    const node = cy.getElementById(item.id);
                    if (node.length > 0) {
                        cy.animate({
                            center: { eles: node },
                            zoom: 1.5
                        }, { duration: 500 });
                    }
                };
                
                refList.appendChild(div);
            });
        }

        let currentMode = 'local';
        let currentUploadedFile = null;

        function handleZipSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentUploadedFile = file;
            uploadZip();
            event.target.value = ''; // Clear to allow re-selecting the same file
        }

        function updateGraph() {
            if (currentMode === 'upload' && currentUploadedFile) {
                uploadZip();
            } else {
                loadGraph();
            }
        }

        function uploadZip() {
            if (!currentUploadedFile) return;

            currentMode = 'upload';
            const filters = getFilterValues();

            const formData = new FormData();
            formData.append('file', currentUploadedFile);
            for (const [key, value] of Object.entries(filters)) {
                formData.append(key, value);
            }
            
            const loading = document.getElementById('loading');
            loading.classList.add('active');
            
            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showToast('Error: ' + data.error, 5000);
                } else {
                    renderGraph(data);
                }
                loading.classList.remove('active');
            })
            .catch(err => {
                console.error(err);
                showToast('Upload failed.', 5000);
                loading.classList.remove('active');
            });
        }

        function getFilterValues() {
            const mode = document.querySelector('input[name="langMode"]:checked').value;
            return {
                hide_system: document.getElementById('hideSystemHeaders').checked,
                show_c: mode === 'c' || mode === 'cpp',
                show_h: mode === 'c' || mode === 'cpp',
                show_cpp: mode === 'cpp',
                show_js: mode === 'js',
                hide_isolated: document.getElementById('hideIsolated').checked,
                filter_dir: document.getElementById('filterDirInput').value,
            };
        }

        function loadGraph() {
            currentMode = 'local';
            const dir = document.getElementById('dirInput').value;
            const filters = getFilterValues();

            const params = new URLSearchParams({ dir, ...filters });
            const loading = document.getElementById('loading');
            loading.classList.add('active');

            fetch('/api/graph?' + params)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        alert('Error: ' + data.error);
                    } else {
                        renderGraph(data);
                    }
                    loading.classList.remove('active');
                })
                .catch(err => {
                    console.error(err);
                    loading.classList.remove('active');
                });
        }
        
        // Load initial graph
        loadGraph();
    </script>
</body>
</html>
